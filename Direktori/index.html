<!doctype html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Direktori Penjual Bibit - TanamKakao</title>
  <link rel="stylesheet" href="../css/dashboard.css" />
  <link rel="stylesheet" href="../css/direktori.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
  <header class="header">
    <i class="fa-solid fa-bars fa-xl menu-toggle" id="menu-toggle" style="color: rgb(255, 255, 255);"></i>
    <div class="logo">🌱 Tanam<span class="logop">Kakao</span></div>

    <div class="icon-profil">
      <div class="profile-wrap" id="profileWrap">
        <button class="profile-btn" id="profileBtn" aria-haspopup="true" aria-expanded="false">
          <div class="profile-avatar" id="profileAvatar">P</div>
          <span id="profileName">Petani</span>
          <svg class="profile-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </button>
        <div class="profile-dropdown" id="profileDropdown" role="menu">
          <div class="dropdown-header">
            <div class="dropdown-name" id="dropdownName">Petani</div>
            <div class="dropdown-email" id="dropdownEmail">—</div>
          </div>
          <div class="dropdown-menu">
            <a href="../index.html" class="dropdown-item" role="menuitem">
              <i class="fa-solid fa-house fa-sm"></i>
              Halaman Utama
            </a>
            <div class="dropdown-sep"></div>
            <button class="dropdown-item danger" onclick="logout()" role="menuitem">
              <i class="fa-solid fa-right-from-bracket fa-sm"></i>
              Keluar
            </button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="main-container">
    <div class="navcontainer">
      <div class="nav">
        <div class="nav-upper-options">
          <a href="../Dashboard/index.html" class="nav-option">
            <i class="fa-solid fa-house fa-lg" style="color: rgb(255, 255, 255)"></i>
            <h3>Dashboard</h3>
          </a>
          <a href="../SmartSeed/seeding.html" class="nav-option">
            <i class="fa-solid fa-robot fa-lg" style="color: rgb(255, 255, 255)"></i>
            <h3>Smart Seeding</h3>
          </a>
          <a href="../kebun/kebun.html" class="nav-option">
            <i class="fa-solid fa-trowel fa-lg" style="color: rgb(255, 255, 255)"></i>
            <h3>Kebun Saya</h3>
          </a>
          <a href="../Jadwal/jadwal.html" class="nav-option">
            <i class="fa-regular fa-calendar-days fa-lg" style="color: rgb(255, 255, 255)"></i>
            <h3>Jadwal Rawat</h3>
          </a>
          <a href="../Direktori/index.html" class="nav-option">
            <i class="fa-solid fa-seedling fa-lg" style="color: rgb(255, 255, 255)"></i>
            <h3>Direktori Supplier</h3>
          </a>
        </div>
      </div>
    </div>

    <div class="content">
      <section class="halaman-direktori">
        <h2 class="judul-halaman">Direktori Penjual & Bibit Kakao</h2>
        <p class="sub-judul">
          Cari dan hubungi penyedia bibit unggul terpercaya.
        </p>

        <div class="search-section">
          <input type="text" id="cariLokasi" placeholder="Cari nama bibit atau lokasi..." class="search-input" />
          <button type="button" class="btn-primary" onclick="filterPenjual()">
            Cari
          </button>
        </div>

        <ul id="daftarPenjual" class="seller-list"></ul>
      </section>
    </div>
  </div>
  <script src="../js/direktori.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    requireAuth();
  </script>
</body>

</html>
