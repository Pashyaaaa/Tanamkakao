<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Masuk — TanamKakao</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/auth.css" />
  </head>
  <body class="page-enter">
    <div class="wipe-container">
      <div class="wipe-layer layer-1"></div>
      <div class="wipe-layer layer-2"></div>
      <div class="wipe-layer layer-3"></div>
    </div>
    <aside class="brand-panel">
      <a href="../index.html" class="brand-logo">
        <span class="logo-icon">🌱</span>
        <span class="logo-text">TanamKakao</span>
      </a>
      <div class="brand-body">
        <p class="brand-eyebrow">Selamat datang kembali</p>
        <h1 class="brand-headline">
          <p>Pantau kebun</p>
          <p>kakao Anda</p>
          <p>dari mana saja.</p>
        </h1>
        <p class="brand-sub">
          Data real-time, cuaca terkini, dan panduan budidaya dalam satu dasbor.
        </p>
      </div>
      <div class="brand-deco" aria-hidden="true">
        <div class="deco-circle c1"></div>
        <div class="deco-circle c2"></div>
        <div class="deco-leaf l1">🍃</div>
        <div class="deco-leaf l2">🍫</div>
      </div>
    </aside>

    <main class="form-panel">
      <div class="form-container">
        <div class="auth-notice" id="authNotice" style="display: none">
          <span>🔒</span> Halaman tersebut memerlukan login terlebih dahulu.
        </div>

        <div class="form-header">
          <h2 class="form-title">Masuk</h2>
          <p class="form-subtitle">
            Belum punya akun?
            <a href="register.html" class="link">Daftar sekarang</a>
          </p>
        </div>

        <form id="loginForm" novalidate>
          <div class="field-group">
            <label class="field-label" for="email">Email</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg
                  viewBox="0 0 20 20"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    d="M2.5 5.5C2.5 4.948 2.948 4.5 3.5 4.5H16.5C17.052 4.5 17.5 4.948 17.5 5.5V14.5C17.5 15.052 17.052 15.5 16.5 15.5H3.5C2.948 15.5 2.5 15.052 2.5 14.5V5.5Z"
                    stroke="currentColor"
                    stroke-width="1.5"
                  />
                  <path
                    d="M2.5 5.5L10 10.5L17.5 5.5"
                    stroke="currentColor"
                    stroke-width="1.5"
                  />
                </svg>
              </span>
              <input
                class="field-input"
                type="email"
                id="email"
                name="email"
                placeholder="nama@email.com"
                autocomplete="email"
                required
              />
            </div>
            <span class="field-error" id="emailError"></span>
          </div>

          <div class="field-group">
            <label class="field-label" for="password">
              Password
              <a href="#" class="link link-sm forgot-link">Lupa password?</a>
            </label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg
                  viewBox="0 0 20 20"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <rect
                    x="4"
                    y="9"
                    width="12"
                    height="9"
                    rx="1.5"
                    stroke="currentColor"
                    stroke-width="1.5"
                  />
                  <path
                    d="M7 9V6.5A3 3 0 0 1 13 6.5V9"
                    stroke="currentColor"
                    stroke-width="1.5"
                  />
                  <circle cx="10" cy="13.5" r="1" fill="currentColor" />
                </svg>
              </span>
              <input
                class="field-input"
                type="password"
                id="password"
                name="password"
                placeholder="••••••••"
                autocomplete="current-password"
                required
              />
              <button
                type="button"
                class="toggle-pw"
                id="togglePw"
                aria-label="Tampilkan password"
              >
                <svg class="eye-icon" viewBox="0 0 20 20" fill="none">
                  <path
                    d="M1 10C1 10 4 4 10 4C16 4 19 10 19 10C19 10 16 16 10 16C4 16 1 10 1 10Z"
                    stroke="currentColor"
                    stroke-width="1.5"
                  />
                  <circle
                    cx="10"
                    cy="10"
                    r="2.5"
                    stroke="currentColor"
                    stroke-width="1.5"
                  />
                </svg>
              </button>
            </div>
            <span class="field-error" id="passwordError"></span>
          </div>

          <div class="field-group checkbox-group">
            <label class="checkbox-label">
              <input type="checkbox" id="remember" class="checkbox-input" />
              <span class="checkbox-custom"></span>
              Ingat saya
            </label>
          </div>

          <div
            class="alert alert-error"
            id="loginError"
            style="display: none"
          ></div>

          <button type="submit" class="btn-primary" id="submitBtn">
            <span class="btn-text">Masuk ke Dasbor</span>
            <span class="btn-loader" style="display: none">
              <svg class="spinner" viewBox="0 0 24 24">
                <circle
                  cx="12"
                  cy="12"
                  r="10"
                  stroke="currentColor"
                  stroke-width="3"
                  fill="none"
                  stroke-dasharray="31.4"
                  stroke-dashoffset="10"
                />
              </svg>
            </span>
          </button>
        </form>

        <div class="divider"><span>atau</span></div>

        <a href="../index.html" class="btn-ghost">← Kembali ke beranda</a>
      </div>
    </main>

    <script src="../js/auth.js"></script>
    <script>
      redirectIfLoggedIn();

      document.addEventListener("DOMContentLoaded", () => {
        setTimeout(() => {
          document.body.classList.remove("page-enter");
        }, 700);

        document.addEventListener("click", (e) => {
          const link = e.target.closest("a");

          if (
            link &&
            link.href &&
            !link.getAttribute("href").startsWith("#") &&
            link.target !== "_blank" &&
            link.hostname === window.location.hostname
          ) {
            e.preventDefault();
            const targetUrl = link.href;

            document.body.classList.add("page-exit");

            setTimeout(() => {
              window.location.href = targetUrl;
            }, 800);
          }
        });
      });

      const params = new URLSearchParams(window.location.search);
      if (params.get("reason") === "auth") {
        document.getElementById("authNotice").style.display = "flex";
      }
      if (params.get("registered") === "1") {
        const notice = document.getElementById("authNotice");
        notice.style.display = "flex";
        notice.style.background = "rgba(39,174,96,0.08)";
        notice.style.borderColor = "rgba(39,174,96,0.25)";
        notice.style.color = "#27ae60";
        notice.innerHTML =
          "<span>✅</span> Akun berhasil dibuat! Silakan masuk dengan akun baru Anda.";
      }

      const toggleBtn = document.getElementById("togglePw");
      const pwInput = document.getElementById("password");
      toggleBtn.addEventListener("click", () => {
        const isText = pwInput.type === "text";
        pwInput.type = isText ? "password" : "text";
        toggleBtn.setAttribute(
          "aria-label",
          isText ? "Tampilkan password" : "Sembunyikan password",
        );
      });

      const form = document.getElementById("loginForm");
      const loginError = document.getElementById("loginError");
      const submitBtn = document.getElementById("submitBtn");

      function setLoading(loading) {
        submitBtn.disabled = loading;
        submitBtn.querySelector(".btn-text").style.display = loading
          ? "none"
          : "inline";
        submitBtn.querySelector(".btn-loader").style.display = loading
          ? "inline-flex"
          : "none";
      }

      function clearErrors() {
        document.getElementById("emailError").textContent = "";
        document.getElementById("passwordError").textContent = "";
        loginError.style.display = "none";
      }

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        clearErrors();

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        let valid = true;

        if (!email) {
          document.getElementById("emailError").textContent =
            "Email wajib diisi.";
          valid = false;
        } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          document.getElementById("emailError").textContent =
            "Format email tidak valid.";
          valid = false;
        }
        if (!password) {
          document.getElementById("passwordError").textContent =
            "Password wajib diisi.";
          valid = false;
        }
        if (!valid) return;

        setLoading(true);
        setTimeout(() => {
          const result = login(email, password);
          setLoading(false);
          if (result.success) {
            window.location.href = "../Dashboard/index.html";
          } else {
            loginError.textContent = result.message;
            loginError.style.display = "flex";
          }
        }, 600);
      });
    </script>
  </body>
</html>
